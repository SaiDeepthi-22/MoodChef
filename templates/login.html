<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MoodChef</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Slightly Darker Animated Background */
    .animated-bg {
      background: linear-gradient(-45deg, #cbd5e1, #c7b0db, #bfa3da, #d1b3c4);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      animation: float 8s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
    }
  </style>
</head>

<body class="animated-bg min-h-screen flex items-center justify-center relative overflow-hidden">

  <!-- Floating Bubbles -->
  <div class="bubble w-24 h-24 top-10 left-10"></div>
  <div class="bubble w-16 h-16 top-32 right-16"></div>
  <div class="bubble w-20 h-20 bottom-16 left-32"></div>
  <div class="bubble w-28 h-28 bottom-8 right-20"></div>

  <!-- Login Card -->
  <div class="glass p-8 rounded-3xl shadow-2xl w-[90%] max-w-md z-10 text-gray-900">
    <div class="flex flex-col items-center mb-6">
      <img src="{{ url_for('static', filename='logo.png') }}"
           alt="MoodChef Logo"
           class="w-20 h-20 rounded-full border-4 border-white mb-3" />
      <h2 class="text-2xl font-semibold">MoodChef 🍽️</h2>
    </div>

    <form action="{{ url_for('login') }}" method="POST" class="flex flex-col gap-4">
      <input type="email" name="email" placeholder="Email" required
             class="px-4 py-2 rounded-full bg-white/60 placeholder-gray-700 text-gray-800 outline-none focus:ring-2 focus:ring-indigo-300 transition duration-300" />

      <input type="password" name="password" placeholder="Password" required
             class="px-4 py-2 rounded-full bg-white/60 placeholder-gray-700 text-gray-800 outline-none focus:ring-2 focus:ring-indigo-300 transition duration-300" />

      <button type="submit"
              class="bg-indigo-500 text-white font-bold py-2 rounded-full hover:bg-indigo-600 transition duration-300 transform hover:scale-105">
        Login
      </button>
    </form>

    <p class="mt-4 text-sm text-center text-gray-800">
      Don't have an account?
      <a href="{{ url_for('signup') }}" class="text-indigo-700 underline hover:text-indigo-900">Sign up here</a>
    </p>
  </div>

</body>
</html>
