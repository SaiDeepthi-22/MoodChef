    <!-- 🔹 Quick Hub -->

      let selectedMood = null;
      let selectedDietary = null;
      let utterance = null;
      let paused = false;
      let index = 0;
      let steps = [];

      function useDetectedMood() {
        window.location.href = "/detect";
      }

      function submitMood() {
  selectedMood = document.getElementById('manualMood').value;
  sessionStorage.setItem('selectedMood', selectedMood); // ✅ ADD THIS
  alert(`You selected mood: ${selectedMood}`);
  showDietaryPreferences();
}


      function showDietaryPreferences() {
        document.getElementById('dietaryPreferences').classList.remove('hidden');
      }

      function submitDietary() {
        selectedMood = (selectedMood || sessionStorage.getItem('selectedMood'));
  selectedDietary = document.getElementById('dietaryChoice').value;
  selectedNutrition = document.getElementById('nutritionChoice').value;

  if (!selectedMood || !selectedDietary || !selectedNutrition) {
    alert("Please make sure mood, dietary preference, and nutrition goal are selected.");
    return;
  }

  // Force lowercase (important!)
  selectedMood = selectedMood.toLowerCase();
  selectedDietary = selectedDietary.toLowerCase();
  selectedNutrition = selectedNutrition.toLowerCase();

  // Debug log (optional but helpful)
  console.log("DEBUG - Mood:", selectedMood, "Diet:", selectedDietary, "Nutrition:", selectedNutrition);

  alert(`You selected: Mood = ${selectedMood}, Diet = ${selectedDietary}, Nutrition = ${selectedNutrition}`);
  showRecipe();
}




function showRecipe() {
  const recipeData = getRecipe(selectedMood, selectedDietary, selectedNutrition);
  let content = `<h3 class='text-xl font-bold mb-2'>${recipeData.name}</h3>`;
  content += `<p class='mb-2'><strong>Ingredients:</strong> ${recipeData.ingredients.join(', ')}</p>`;
  content += recipeData.steps;
  document.getElementById('recipeContent').innerHTML = content;
  document.getElementById('recipeDisplay').classList.remove('hidden');
  document.getElementById('dietaryPreferences').classList.add('hidden');
  readRecipeSteps(recipeData.steps);
}

      function pauseCooking() {
      if (speechSynthesis.speaking && !speechSynthesis.paused) {
        speechSynthesis.pause();
        paused = true;
      }
    }

    function resumeCooking() {
      if (speechSynthesis.paused) {
        speechSynthesis.resume();
        paused = false;
      }
    }

    function stopCooking() {
      speechSynthesis.cancel();
      paused = false;
      index = 0;
    }

    function goBack() {
      document.getElementById('recipeDisplay').classList.add('hidden');
      document.getElementById('dietaryPreferences').classList.remove('hidden');
    }

      function readRecipeSteps(recipeHTML) {
        speechSynthesis.cancel();
        paused = false;
        index = 0;
        utterance = null;
        steps = recipeHTML.match(/<p class="step">.*?<\/p>/g);
        if (steps && steps.length > 0) speakStep();
      }

      function speakStep() {
        if (index < steps.length) {
          const stepText = steps[index].replace(/<[^>]+>/g, "");
          utterance = new SpeechSynthesisUtterance(stepText);
          utterance.onend = function () {
            if (!paused) {
              index++;
              speakStep();
            }
          };
          speechSynthesis.speak(utterance);
        }
      }

function showChatbot() {
  document.getElementById("chatbotOverlay").classList.remove("hidden");

  const chatBox = document.getElementById("chat-box");
  chatBox.innerHTML = `<div><strong>MoodChef:</strong> Hi! How are you feeling today? 😊</div>`;
}

function closeChatbot() {
  document.getElementById("chatbotOverlay").classList.add("hidden");
}

async function handleUserInput() {
  const input = document.getElementById("userInput").value.trim().toLowerCase();
  if (!input) return;

  const chatBox = document.getElementById("chat-box");
  chatBox.innerHTML += `<div><strong>You:</strong> ${input}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
  document.getElementById("userInput").value = "";

  if (chatStep === 0) {
    userMood = input;
    chatBox.innerHTML += `<div><strong>MoodChef:</strong> ${
      userMood.includes("happy") ? "Yay! Glad you're feeling happy! 🌞" :
      userMood.includes("sad") ? "Oh no, don't worry, we'll cheer you up! 🌧️" :
      userMood.includes("angry") ? "Uh oh, let's find something to calm you down. 🔥" :
      userMood.includes("surprised") ? "Wow! Let's surprise you with a cool dish! 🎉" :
      "Got it! Let's make something amazing! 🍽️"
    }</div>`;
    chatBox.innerHTML += `<div><strong>MoodChef:</strong> Now, what's your dietary preference? (vegan / vegetarian / non-vegetarian)</div>`;
    chatStep = 1;
  } else if (chatStep === 1) {
    userDiet = input;
    if (!["vegan", "vegetarian", "non-vegetarian"].includes(userDiet)) {
      chatBox.innerHTML += `<div><strong>MoodChef:</strong> Please choose vegan, vegetarian, or non-vegetarian. 🌱🍗</div>`;
      return;
    }
    chatBox.innerHTML += `<div><strong>MoodChef:</strong> Awesome! Preparing a recipe for you... 🍳</div>`;

    // Set mood and diet
    sessionStorage.setItem('selectedMood', userMood);
    sessionStorage.setItem('selectedDietary', userDiet);

    selectedMood = userMood;
selectedDietary = userDiet;
selectedNutrition = "balanced"; // 👈 Default or extend chatbot to ask for it
showRecipe();


    // Reset chatbot
    chatStep = 0;
    userMood = null;
    userDiet = null;
  }
}
function pauseCooking() {
  if (speechSynthesis.speaking && !speechSynthesis.paused) {
    speechSynthesis.pause();
    paused = true;

    document.getElementById('pauseBtn').classList.add('hidden');
    document.getElementById('resumeBtn').classList.remove('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
  }
}

function resumeCooking() {
  if (speechSynthesis.paused) {
    speechSynthesis.resume();
    paused = false;

    document.getElementById('resumeBtn').classList.add('hidden');
    document.getElementById('pauseBtn').classList.remove('hidden');
    document.getElementById('stopBtn').classList.remove('hidden');
  }
}
function stopCooking() {
  speechSynthesis.cancel();
  paused = false;
  index = 0;

  // After stopping, show only Pause button again
  document.getElementById('pauseBtn').classList.remove('hidden');
  document.getElementById('resumeBtn').classList.add('hidden');
  document.getElementById('stopBtn').classList.add('hidden');
}

   <script>
    let timeLeft = 60;
    let timerId;
    let points = 0;

    function startChallenge() {
        timeLeft = 60;
        points = 0;
        document.getElementById("challengeStatus").innerHTML = `Challenge started! Time left: ${timeLeft}s<br>Points: ${points}`;
        timerId = setInterval(updateChallenge, 1000);
    }

    function updateChallenge() {
        timeLeft--;
        points += 10;
        document.getElementById("challengeStatus").innerHTML = `Time left: ${timeLeft}s<br>Points: ${points}`;

        if (timeLeft <= 0) {
            clearInterval(timerId);
            document.getElementById("challengeStatus").innerHTML = `Challenge complete! You earned ${points} points! 🎉`;
        }
    }
</script>
